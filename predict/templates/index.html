<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ethereum AI + RL Trading Bot</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container {
      max-width: 500px;
      margin: 50px auto;
      padding: 30px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    h1 { 
      text-align: center; 
      color: #00ff88; 
      margin-bottom: 10px;
      font-size: 2em;
      text-shadow: 0 0 20px rgba(0,255,136,0.5);
    }
    .subtitle {
      text-align: center;
      color: #ccc;
      margin-bottom: 30px;
      font-size: 1.1em;
    }
    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      background: linear-gradient(45deg, #00ff88, #00cc66);
      color: white;
    }
    button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,255,136,0.4); }
    button:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }
    #walletAddress {
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      text-align: center;
      font-family: monospace;
      font-size: 14px;
      word-break: break-all;
    }
    .section {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .status {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      margin: 10px 0;
    }
    .status-active { background: rgba(0,255,136,0.2); color: #00ff88; border: 1px solid #00ff88; }
    .status-inactive { background: rgba(255,0,0,0.2); color: #ff6666; border: 1px solid #ff6666; }
    #result {
      min-height: 120px;
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .price {
      text-align: center;
      font-size: 1.3em;
      font-weight: bold;
      color: #00ff88;
      margin: 20px 0;
    }
    .loader {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #00ff88;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Ethereum AI + RL Bot</h1>
    <p class="subtitle">Connect → Pay → Auto-Trade</p>

    <button id="connectBtn">🔗 Connect MetaMask</button>
    <div id="walletAddress">Click to connect wallet</div>

    <!-- Basic Advice -->
    <div class="section">
      <h3>📈 AI Prediction ($10)</h3>
      <button id="payAdviceBtn" disabled>Pay 0.01 ETH</button>
      <button id="getAdviceBtn" disabled>Get Prediction</button>
      <span id="adviceStatus" class="status status-inactive">Not Paid</span>
    </div>

    <!-- RL Agent -->
    <div class="section">
      <h3>🚀 RL Trading Bot ($50/24h)</h3>
      <button id="payRLBtn" disabled>Unlock Auto-Trading</button>
      <span id="rlStatus" class="status status-inactive">Inactive</span>

    <!-- NEW USER STRATEGY FORM -->
    <div id="newStrategyForm" style="background:#1a1a2e;padding:20px;border-radius:12px;margin:15px 0;">
    <h4>➕ Create Trading Strategy</h4>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <input id="buyPrice" type="number" placeholder="Buy Price $" value="">
        <input id="sellPrice" type="number" placeholder="Sell Price $" value="">
        <input id="buyEthAmt" type="number" placeholder="Buy ETH Quantity" value="">
        <input id="sellEthAmt" type="number" placeholder="Sell ETH Quantity" value="">
        <input id="totalEthAmt" type="number" placeholder="Total ETH Quantity" value="">
        <input id="commissionPct" type="number" placeholder="Commission %" value="2">
        <input id="walletAddr" type="text" placeholder="Wallet..." readonly>
    </div>
    <button onclick="createFullStrategy()" style="width:100%;margin-top:15px;padding:15px;background:linear-gradient(45deg,#00ff88,#00cc66);color:black;font-weight:bold;border:none;border-radius:8px;font-size:16px;">
        🚀 Create & Start Bot
    </button>
    </div>


    <!-- Add this in bot-dashboard section after Toggle button -->
    <div style="margin-top:15px;">
        <h4>⚙️ Update Strategy</h4>
        <input id="buyPrice" type="number" placeholder="Set Buy Price" step="0.01" value="" style="width:120px;padding:8px;">
        <input id="sellPrice" type="number" placeholder="Set Sell Price" step="0.01" value="" style="width:120px;padding:8px;margin-left:10px;">
        <button onclick="updateStrategy()" style="padding:8px 15px;">Update</button>
    </div> 

    <!-- RL Bot Dashboard Section -->
    <div id="bot-dashboard" style="display: none; padding: 20px; border: 1px solid #ccc; margin: 20px;">
    <h3>RL Trading Bot Status</h3>
    <div id="strategies-list"></div>
    <button id="toggleAgentBtn" onclick="toggleAgent()">Toggle RL Agent</button>

    <div id="recent-trades" style="max-height:300px;overflow-y:auto;">
      <h4>📊 Recent Trades <span id="tradeCount">(0)</span></h4>
      <div id="tradesList">No trades yet...</div>
    </div>

</div>

    </div>

    <div class="price" id="ethPrice">Loading ETH price...</div>
    
    <div class="loader" id="loader"></div>
    <div id="result">Ready to trade! 👇</div>
  </div>

let web3, account, contract;
let currentWallet = null;  // Track connected wallet

// 1. Connect button
document.getElementById('connectBtn').onclick = async () => {
    console.log('Connect clicked');
    if (!window.ethereum) {
        alert('Install MetaMask: https://metamask.io');
        return;
    }
    try {
        console.log('Requesting accounts...');
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        account = accounts[0];
        web3 = new Web3(window.ethereum);
        contract = new web3.eth.Contract(CONTRACT_ABI, CONTRACT_ADDRESS);
        
        document.getElementById('walletAddress').innerHTML = account.slice(0,8) + '...' + account.slice(-6);
        document.getElementById('payAdviceBtn').disabled = false;
        document.getElementById('payRLBtn').disabled = false;
        currentWallet = account;  // Set wallet for API calls
        
        updateStatus();
        getETHPrice();
        showBotDashboard();  // Show dashboard after connect
    } catch (err) {
        console.error(err);
        alert('Connection failed: ' + err.message);
    }
};

// 2. Pay for advice (unchanged)
document.getElementById('payAdviceBtn').onclick = async () => {
    try {
        const fee = web3.utils.toWei('0.01', 'ether');
        await contract.methods.payForAdvice().send({ from: account, value: fee });
        alert('Advice payment OK!');
        updateStatus();
    } catch (err) {
        alert('Payment failed: ' + err.message);
    }
};

// 3. Pay for RL - FIXED to auto-enroll and show dashboard
document.getElementById('payRLBtn').onclick = async () => {
    try {
        const fee = web3.utils.toWei('0.05', 'ether');
        
        // FIXED: Higher gas limit
        const tx = await contract.methods.payForRLAgent().send({
            from: account,
            value: fee,
            gas: 300000,  // ✅ Increased from default
            gasPrice: web3.utils.toWei('20', 'gwei')
        });
        
        console.log('TX Success:', tx);
        alert('RL Bot unlocked for 24h!');

        alert('✅ RL Bot ACTIVATED & ENABLED!');
        fetchBotStatus();  // Refresh immediately
        setTimeout(fetchBotStatus, 1000);  // Double-check
        
        // NEW: Enroll strategy in backend after payment
        await fetch('/api/enroll-rl/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ wallet_address: account, agent_enabled: true, is_active: true })
        });
        
        updateStatus();
        showBotDashboard();  // Force show dashboard
        fetchBotStatus();    // Load initial status
    } catch (err) {
        alert('RL payment failed: ' + err.message);
    }
};

async function createMyStrategy() {
    if (!currentWallet) return alert('Connect first');
    
    const params = {
        wallet_address: currentWallet,
        buy_price: parseFloat(document.getElementById('newBuyPrice').value),
        sell_price: parseFloat(document.getElementById('newSellPrice').value),
        eth_amount: parseFloat(document.getElementById('newEthAmount').value),
        commission_percent: parseFloat(document.getElementById('newCommission').value)
    };
    
    try {
        const res = await fetch('/api/create-strategy/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(params)
        });
        
        const data = await res.json();
        if (data.success) {
            alert(`✅ Strategy created! Bot active at Buy $${params.buy_price}`);
            document.getElementById('newStrategyForm').style.display = 'none';
            fetchBotStatus();
        }
    } catch(e) {
        alert('Create failed: ' + e.message);
    }
}

async function updateStrategy() {
    if (!currentWallet) return alert('Connect wallet');
    
    const buyPrice = parseFloat(document.getElementById('buyPrice').value);
    const sellPrice = parseFloat(document.getElementById('sellPrice').value);
    
    if (!buyPrice || !sellPrice) return alert('Enter prices');
    
    try {
        const res = await fetch('/api/update-strategy/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                wallet_address: currentWallet,
                buy_price: buyPrice,
                sell_price: sellPrice
            })
        });
        
        const data = await res.json();
        if (data.success) {
            alert(`✅ Updated: Buy $${buyPrice} Sell $${sellPrice}`);
            fetchBotStatus();
        } else {
            alert('Update failed: ' + data.error);
        }
    } catch(e) {
        alert('Error: ' + e.message);
    }
}


// FIX: Toggle RL Agent
async function toggleAgent() {
    if (!currentWallet) {
        alert('Connect wallet first');
        return;
    }
    try {
        document.getElementById('toggleAgentBtn').disabled = true;
        const res = await fetch('/api/toggle-agent/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ wallet_address: currentWallet })
        });
        const data = await res.json();
        if (data.success) {
            alert(data.agent_enabled ? 'Agent ENABLED' : 'Agent DISABLED');
            fetchBotStatus();  // Refresh dashboard
        } else {
            alert('Toggle failed: ' + data.error);
        }
    } catch (err) {
        alert('Toggle error: ' + err.message);
    } finally {
        document.getElementById('toggleAgentBtn').disabled = false;
    }
}


// 4. Get AI advice (unchanged)
document.getElementById('getAdviceBtn').onclick = async function() {
    document.getElementById('loader').style.display = 'block';
    document.getElementById('result').innerHTML = 'AI analyzing ETH...';
    
    try {
        console.log('Calling:', `/get_advice/?address=${currentWallet}`);
        const res = await fetch(`/get_advice/?address=${currentWallet}`);
        const data = await res.json();
        console.log('RESPONSE:', data);
        
        if (data.error) {
            document.getElementById('result').innerHTML = `<p style="color:orange;">${data.error}</p>`;
            return;
        }
        
        // Safe display
        document.getElementById('result').innerHTML = `
            <div style="padding:20px;">
                <h3>${data.advice || 'HOLD'}</h3>
                <p>Current Price: ${data.current_price ? '$' + data.current_price.toFixed(2) : 'N/A'}</p>
                <p>Current Time:</strong> ${data.current_time}</p>
                <p>Predicted Price: ${data.predicted_price ? '$' + data.predicted_price.toFixed(2) : 'N/A'}</p>
                <p>Predicted Time:</strong> ${data.predicted_time}</p>
                ${data.plot_image ? `<br><img src="data:image/png;base64,${data.plot_image}" style="max-width:100%;">` : ''}
            </div>
        `;

        
    } catch(e) {
        console.error('Fetch error:', e);
        document.getElementById('result').innerHTML = 'Network error';
    }
    document.getElementById('loader').style.display = 'none';
};


// FIXED: Show bot dashboard
function showBotDashboard() {
    document.getElementById('bot-dashboard').style.display = 'block';
}

// NEW/FIXED: Fetch and display bot status
async function fetchBotStatus() {
    if (!currentWallet) return console.log('No wallet connected');
    
    try {
        // ✅ Full URL with wallet param
        const url = `/api/bot-status/?wallet=${currentWallet}`;
        console.log('Fetching:', url);
        
        const res = await fetch(url);
        const data = await res.json();
        console.log('Bot data:', data);
        
        displayStrategies(data.strategies || []);
        displayTrades(data.recent_trades || data.trades || []);
    } catch(e) {
        console.error('Bot status failed:', e);
    }
}

// FIXED: Display strategies (handle empty case)
{% comment %} function displayStrategies(strats) {
    let html = '';
    if (strats.length === 0) {
        html = '<p>No strategies enrolled. Pay for RL Bot to start.</p>';
    } else {
        strats.forEach(s => {
            html += `
                <div style="border:1px solid #ddd; margin:10px; padding:10px;">
                    <p>Wallet: ${s.wallet.slice(0,6)}...${s.wallet.slice(-4)}</p>
                    <p>Agent: ${s.agent_enabled ? 'ON' : 'OFF'} | Current ETH: $${s.current_price}</p>
                    <p>Buy: $${s.buy_price} | Sell: $${s.sell_price}</p>
                    <p>Status: ${s.is_trading ? 'Active Trading' : 'Idle'}</p>
                </div>
            `;
        });
    }
    document.getElementById('strategies-list').innerHTML = html;
} {% endcomment %}

        buy_eth_amount: parseFloat(document.getElementById('buyEthAmt')?.value || 0.1),
        sell_eth_amount: parseFloat(document.getElementById('sellEthAmt')?.value || 0.1),
        eth_amount: parseFloat(document.getElementById('totalEthAmt')?.value || 1.0),
        commission_percent: parseFloat(document.getElementById('commissionPct')?.value || 2.0)
    };
    
    // Validation
    if (!strategyData.buy_price || !strategyData.sell_price) {
        alert('Enter Buy/Sell prices');
        return;
    }
    
    fetch('/api/create-full-strategy/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(strategyData)
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alert(`✅ Strategy #${data.id} created!\nBuy $${strategyData.buy_price}\nSell $${strategyData.sell_price}`);
            document.getElementById('newStrategyForm').style.display = 'none';
            fetchBotStatus();
        } else {
            alert('Create failed: ' + (data.error || 'Unknown'));
        }
    })
    .catch(e => alert('Network error: ' + e.message));
}


// FIXED: Display recent trades
async function displayTrades() {
    if (!currentWallet) return;
    try {
        const res = await fetch(`/api/trades/?wallet=${currentWallet}`);  // Add ?wallet=
        const data = await res.json();
        console.log('Trades data:', data);  // DEBUG
        
        const tradesList = document.getElementById('recent-trades');
        if (!data.trades || !Array.isArray(data.trades) || data.trades.length === 0) {
            tradesList.innerHTML = '<p>🟡 No trades yet - bot starting up...</p>';
            return;
        }
        
        let html = '<h4>📈 Recent Trades:</h4>';
        data.trades.slice(0,5).forEach(t => {
            html += `<div style="padding:8px;border-bottom:1px solid #444;">
                ${t.action || '?'} ${t.eth_amount || 0} ETH @ $${t.price?.toFixed(2) || '?'} 
                <small>${t.created_at || ''}</small>
            </div>`;
        });
        tradesList.innerHTML = html;
    } catch(err) {
        console.error('Trades error:', err);
        document.getElementById('recent-trades').innerHTML = '<p style="color:orange;">Trades loading...</p>';
    }
}


async function updateStatus() {
    if (!account || !contract) return;
    
    // Advice status
    const hasPaid = await contract.methods.checkHasPaidAdvice(account).call();
    document.getElementById('adviceStatus').textContent = hasPaid ? 'Paid' : 'Not Paid';
    document.getElementById('adviceStatus').className = hasPaid ? 'status status-active' : 'status status-inactive';
    document.getElementById('getAdviceBtn').disabled = !hasPaid;
    
    // RL status
    const rlActive = await contract.methods.checkRLAgentAccess(account).call();
    document.getElementById('rlStatus').textContent = rlActive ? 'Active' : 'Inactive';
    document.getElementById('rlStatus').className = rlActive ? 'status status-active' : 'status status-inactive';
}

// Final displayTrades - production ready
async function displayTrades() {
    try {
        const res = await fetch(`/api/trades/?wallet=${currentWallet}`);
        const data = await res.json();
        const tradesList = document.getElementById('tradesList');
        
        if (!data.trades?.length) {
            tradesList.innerHTML = '<div style="color:#888;padding:20px;">No trades yet<br>Bot will populate when active</div>';
            return;
        }
        
        tradesList.innerHTML = data.trades.slice(0,10).map(t => `
            <div style="display:grid;grid-template-columns:60px 80px 80px 60px;gap:10px;padding:12px 0;border-bottom:1px solid #333;">
                <b>${t.action}</b>
                <span>${(t.eth_amount||0).toFixed(4)} ETH</span>
                <span style="color:#00ff88;">$${(t.usd_value||0).toFixed(0)}</span>
                <span style="color:#aaa;font-size:13px;">${t.created_at||'--'}</span>
            </div>
        `).join('');
    } catch(e) {
        console.error(e);
    }
}




async function getETHPrice() {
    try {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd');
        const data = await res.json();
        document.getElementById('ethPrice').textContent = `ETH $${data.ethereum.usd.toLocaleString()}`;
    } catch (e) {
        document.getElementById('ethPrice').textContent = 'Price fetch failed';
    }
}
