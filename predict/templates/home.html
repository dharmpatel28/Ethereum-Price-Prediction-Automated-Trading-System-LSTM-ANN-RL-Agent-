<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Trading Platform</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f8f9fb; /* soft light base */
    color: #333;
    text-align: center;
    padding-top: 80px;
    overflow: hidden;
    position: relative;
}

/* AI network canvas sits behind content */
canvas#aiCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* Container */
.container {
    max-width: 700px;
    margin: auto;
}

/* Title */
h1 {
    font-size: 2.8em;
    margin-bottom: 50px;
    font-weight: 500;
    color: #1a1a1a;
}

/* Card styling */
.card {
    position: relative;
    background: #ffffff;
    padding: 40px;
    margin: 25px 0;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.35s ease;
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    overflow: hidden;
}

/* spinning border effect */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 16px;
    background: linear-gradient(120deg, rgba(0,0,0,0.03), rgba(0,0,0,0.08), rgba(0,0,0,0.03));
    opacity: 0;
    transition: opacity 0.4s ease;
}

/* soft inner glow */
.card::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: radial-gradient(circle at center, rgba(0,0,0,0.03), transparent 70%);
    opacity: 0;
    transition: 0.4s;
}

/* hover effects */
.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 35px rgba(0,0,0,0.15);
}

.card:hover::before {
    opacity: 1;
    animation: spin 6s linear infinite;
}

.card:hover::after {
    opacity: 1;
}

/* spin animation */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* card content */
.card h2 {
    font-size: 1.6em;
    margin-bottom: 10px;
    color: #1a1a1a;
}

.card p {
    font-size: 0.95em;
    opacity: 0.7;
    color: #555;
}

/* links */
a {
    text-decoration: none;
    color: inherit;
}

/* entrance animation */
.card {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease forwards;
}

.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.35s; }

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🤖 AI Trading System</h1>

    <a href="/ml/">
        <div class="card">
            <h2>📈 ML Prediction</h2>
            <p>Get AI-based ETH price predictions</p>
        </div>
    </a>

    <a href="/rl/">
        <div class="card">
            <h2>🚀 RL Trading Bot</h2>
            <p>Automated trading using Reinforcement Learning</p>
        </div>
    </a>
</div>

<script>
// AI mesh background
const canvas = document.getElementById("aiCanvas");
const ctx = canvas.getContext("2d");

let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// points for AI mesh
const points = [];
const pointCount = 60;

for (let i = 0; i < pointCount; i++) {
    points.push({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3
    });
}

// animation function
function animate() {
    ctx.clearRect(0,0,width,height);

    // update points
    points.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;

        if(p.x < 0 || p.x > width) p.vx *= -1;
        if(p.y < 0 || p.y > height) p.vy *= -1;

        // draw point
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,0,0,0.07)';
        ctx.fill();
    });

    // connect points
    for(let i=0;i<points.length;i++){
        for(let j=i+1;j<points.length;j++){
            const p1 = points[i];
            const p2 = points[j];
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 120){
                ctx.beginPath();
                ctx.strokeStyle = `rgba(0,0,0,${0.08 - dist/1500})`;
                ctx.lineWidth = 1;
                ctx.moveTo(p1.x,p1.y);
                ctx.lineTo(p2.x,p2.y);
                ctx.stroke();
            }
        }
    }

    requestAnimationFrame(animate);
}

animate();

// resize handling
window.addEventListener("resize", () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
});
</script>

</body>
</html>
